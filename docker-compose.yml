version: "3.8"
services:
  backend:
    build: ./backend
    container_name: asifeda-backend
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=sqlite:///./asifeda.db
    volumes:
      - ./backend/app:/app/app
      - backend_data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
  frontend:
    build: ./frontend
    container_name: asifeda-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
volumes:
  backend_data:
