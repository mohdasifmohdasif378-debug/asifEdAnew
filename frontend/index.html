<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AsifEdA AI</title>
	<link rel="stylesheet" href="css/styles.css">
	<style>
		.header-controls button{margin-left:6px}
		#syllabusDetail, #userNotesList{margin-top:10px}
		#noteForm input, #noteForm textarea{display:block;width:100%;margin:6px 0}
	</style>
</head>
<body>
	<div class="glass-card" id="app">
		<h1>AsifEdA <small>v3 · Claude AI</small></h1>
		<div class="sub">local & private</div>

		<div id="authSection">
			<div class="auth-form" id="loginForm">
				<h3>🔐 Login</h3>
				<div class="input-group"><label>Username</label><input type="text" id="loginUsername" placeholder="username"></div>
				<div class="input-group"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••"></div>
				<button id="loginBtn">Login →</button>
				<div class="toggle-link">Don't have an account? <a id="showRegisterLink" href="#">Register now</a></div>
				<div id="loginError" class="error-msg" style="display:none;"></div>
			</div>

			<div class="auth-form" id="registerForm" style="display:none;">
				<h3>📝 Register</h3>
				<div class="input-group"><label>Username</label><input type="text" id="regUsername" placeholder="choose username"></div>
				<div class="input-group"><label>Password</label><input type="password" id="regPassword" placeholder="min 4 characters"></div>
				<button id="registerBtn">Create account →</button>
				<div class="toggle-link">Already have an account? <a id="showLoginLink" href="#">Login</a></div>
				<div id="regError" class="error-msg" style="display:none;"></div>
			</div>
		</div>

		<div id="chatSection" style="display:none;">
			<div class="chat-header">
				<span>💬 <span id="chatUsername"></span></span>
				<div class="header-controls">
					<button id="showSyllabusBtn">Syllabus</button>
					<button id="showNotesBtn">Notes</button>
					<button id="logoutBtn" class="logout-btn">🚪 Logout</button>
				</div>
			</div>
			<div id="chatMessages" class="chat-messages"><div class="message bot-message">👋 Hello! I'm AsifEdA.</div></div>
			<div class="input-area"><textarea id="messageInput" rows="1" placeholder="Type your message..."></textarea><button id="sendBtn">Send</button></div>
			<div id="chatError" class="error-msg" style="display:none;"></div>
		</div>

		<div id="syllabusSection" style="display:none; padding:10px;">
			<h3>Syllabus Browser</h3>
			<div id="examsList"></div>
			<div id="syllabusDetail"></div>
			<div><button id="backToChatFromSyllabus">Back to Chat</button></div>
			<div id="syllabusError" class="error-msg" style="display:none;"></div>
		</div>

		<div id="notesSection" style="display:none; padding:10px;">
			<h3>Your Notes</h3>
			<div id="notesControl">
				<label>Exam: <select id="noteExamSelect"><option value="">Select exam</option></select></label>
				<label>Subject: <select id="noteSubjectSelect"><option value="">Select subject</option></select></label>
				<label>Topic: <select id="noteTopicSelect"><option value="">Select topic</option></select></label>
			</div>
			<div id="noteForm">
				<input id="noteTitle" placeholder="Title" />
				<textarea id="noteContent" placeholder="Write your note..."></textarea>
				<label><input type="checkbox" id="notePublic" /> Make public</label>
				<button id="saveNoteBtn">Save Note</button>
			</div>
			<h4>Your Saved Notes</h4>
			<div id="userNotesList"></div>
			<div><button id="backToChatFromNotes">Back to Chat</button></div>
			<div id="notesError" class="error-msg" style="display:none;"></div>
		</div>

		<footer>🔒 API key never leaves your server</footer>
	</div>
	<script src="js/app.js"></script>
</body>
</html>
